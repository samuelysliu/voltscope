server {
  listen 80;
  server_name voltscopes.com www.voltscopes.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name voltscopes.com www.voltscopes.com;
  client_max_body_size 20m;

  ssl_certificate /etc/letsencrypt/live/voltscopes.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/voltscopes.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=15552000" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  include /etc/nginx/snippets/proxy-locations.conf;
}
