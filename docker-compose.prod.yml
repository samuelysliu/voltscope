services:
  postgres:
    restart: unless-stopped
    ports: []
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    restart: unless-stopped
    ports: []
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    restart: unless-stopped
    ports: []
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/site.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
